name: sender_sms
description: "تطبيق إرسال نتائج الطلاب بالـ SMS للمدارس والسناتر التعليمية"
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Excel Read/Write
  excel: ^4.0.6

  # File Operations
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # Permissions
  permission_handler: ^12.0.1

  # Dependency Injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.7

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Splash Screen
  flutter_native_splash: ^2.4.4
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^22.0.1
  app_badge_plus: ^1.3.1
  
  # Lottie Animation
  lottie: ^3.1.2

  # URL Launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - shorebird.yaml
    - assets/
    - assets/icons/
